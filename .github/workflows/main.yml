name: Deploy to Cloudways

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Create .env file
        run: |
          {
            echo "NEXT_PUBLIC_SHOPIFY_DOMAIN=${{ vars.NEXT_PUBLIC_SHOPIFY_DOMAIN }}"
            echo "NEXT_PUBLIC_URL=${{ vars.NEXT_PUBLIC_URL }}"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            echo "UPSTASH_REDIS_REST_URL=${{ vars.UPSTASH_REDIS_REST_URL }}"
            echo "CHECKOUT_TOKEN_SECRET=${{ secrets.CHECKOUT_TOKEN_SECRET }}"
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            echo "SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}"
            echo "SHOPIFY_API_SECRET=${{ secrets.SHOPIFY_API_SECRET }}"
            echo "SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}"
            echo "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
            echo "SHOPIFY_STOREFRONT_TOKEN=${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}"
            echo "NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN=${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN }}"
            echo "TABBY_PUBLIC_API_KEY_AED=${{ secrets.TABBY_PUBLIC_API_KEY_AED }}"
            echo "TABBY_SECRET_KEY_AED=${{ secrets.TABBY_SECRET_KEY_AED }}"
            echo "TABBY_MERCHANT_KEY_AED=${{ secrets.TABBY_MERCHANT_KEY_AED }}"
            echo "TABBY_WEBHOOK_SECRET_AED=${{ secrets.TABBY_WEBHOOK_SECRET_AED }}"
            echo "TABBY_PUBLIC_API_KEY_KWD=${{ secrets.TABBY_PUBLIC_API_KEY_KWD }}"
            echo "TABBY_SECRET_KEY_KWD=${{ secrets.TABBY_SECRET_KEY_KWD }}"
            echo "TABBY_MERCHANT_KEY_KWD=${{ secrets.TABBY_MERCHANT_KEY_KWD }}"
            echo "TABBY_WEBHOOK_SECRET_KWD=${{ secrets.TABBY_WEBHOOK_SECRET_KWD }}"
            echo "TABBY_PUBLIC_API_KEY_SAR=${{ secrets.TABBY_PUBLIC_API_KEY_SAR }}"
            echo "TABBY_SECRET_KEY_SAR=${{ secrets.TABBY_SECRET_KEY_SAR }}"
            echo "TABBY_MERCHANT_KEY_SAR=${{ secrets.TABBY_MERCHANT_KEY_SAR }}"
            echo "TABBY_WEBHOOK_SECRET_SAR=${{ secrets.TABBY_WEBHOOK_SECRET_SAR }}"
            echo "TAMARA_API_URL=${{ vars.TAMARA_API_URL }}"
            echo "TAMARA_API_KEY=${{ secrets.TAMARA_API_KEY }}"
            echo "TAMARA_NOTIFICATION_TOKEN=${{ secrets.TAMARA_NOTIFICATION_TOKEN }}"
          } > .env
          cp .env .env.production

      - name: Install dependencies
        run: npm ci

      - name: Clear Next.js cache
        run: rm -rf .next

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os
          key = os.environ['SSH_KEY']
          with open(os.path.expanduser('~/.ssh/id_ed25519'), 'w') as f:
              f.write(key + '\n')
          "
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
        env:
          SSH_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}

      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --no-times \
            --no-perms \
            ./ ${{ secrets.CLOUDWAYS_USER }}@${{ secrets.CLOUDWAYS_HOST }}:${{ secrets.CLOUDWAYS_PATH }}/

      - name: Install & Restart on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no \
          ${{ secrets.CLOUDWAYS_USER }}@${{ secrets.CLOUDWAYS_HOST }} << 'EOF'
            cd ${{ secrets.CLOUDWAYS_PATH }}
            npm ci --production
            rm -rf .next/standalone/.next/static
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/public
            node -e "
            const fs = require('fs');
            const vars = {};
            fs.readFileSync('.env', 'utf8').split('\n').forEach(line => {
              const idx = line.indexOf('=');
              if (idx > 0) {
                const key = line.slice(0, idx).trim();
                const val = line.slice(idx + 1).trim();
                if (key) vars[key] = val;
              }
            });
            const config = \`module.exports = {
              apps: [{
                name: 'nextapp',
                script: '.next/standalone/server.js',
                cwd: process.cwd(),
                env: \${JSON.stringify({NODE_ENV: 'production', PORT: 3000, ...vars}, null, 2)},
              }],
            };\`;
            fs.writeFileSync('ecosystem.config.js', config);
            console.log('ecosystem.config.js written with', Object.keys(vars).length, 'vars');
            "
            /home/master/.npm-global/node_modules/pm2/bin/pm2 restart ecosystem.config.js --update-env || \
            /home/master/.npm-global/node_modules/pm2/bin/pm2 start ecosystem.config.js
            /home/master/.npm-global/node_modules/pm2/bin/pm2 save
          EOF
